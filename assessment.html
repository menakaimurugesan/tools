<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEE Mains Study Planner</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc; /* Light gray background */
        }
        .card {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border-radius: 1rem;
        }
        /* Custom border/style for subject grouping */
        .subject-header {
            background-color: #e2e8f0;
            font-weight: 700;
            color: #1f2937;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .status-select {
            transition: all 0.2s;
            border-radius: 0.5rem;
            padding: 0.5rem;
            font-size: 0.875rem; /* text-sm */
            width: 100%;
        }
        .completed-day {
            background-color: #f0fdf4; /* Green tint for completed days */
            color: #6b7280;
        }
.sunday-highlight {
    background: linear-gradient(135deg, rgba(252, 165, 165, 0.08), rgba(252, 165, 165, 0));
}
.subject-row-physics,
.subject-row-chemistry,
.subject-row-mathematics,
.subject-row-mock {
    background-color: transparent;
}
        .subject-tag {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 0.15rem 0.5rem;
            border-radius: 9999px;
        }
        .subject-tag.physics {
            background-color: rgba(59, 130, 246, 0.12);
            color: #1d4ed8;
        }
        .subject-tag.chemistry {
            background-color: rgba(16, 185, 129, 0.12);
            color: #047857;
        }
        .subject-tag.mathematics {
            background-color: rgba(249, 115, 22, 0.12);
            color: #c2410c;
        }
        .subject-tag.mock {
            background-color: rgba(236, 72, 153, 0.12);
            color: #be185d;
        }
        .plan-item-content {
            flex-grow: 1;
        }
        .progress-bar {
            height: 1.5rem;
            border-radius: 9999px;
            overflow: hidden;
            transition: width 0.5s ease-in-out;
        }
        .progress-bar-fill {
            height: 100%;
            transition: width 0.5s ease-in-out;
        }
        #assessmentSection {
            --subject-section-bg: #ffffff;
            --subject-border: #e2e8f0;
            --subject-head-bg: #eef2ff;
            --subject-row-bg: #ffffff;
            --subject-row-hover: #f8fafc;
        }
        #assessmentSection {
            border: 1px solid var(--subject-border);
            background-color: var(--subject-section-bg);
        }
        #assessmentSection table thead {
            background-color: #ffffff;
        }
        #assessmentSection table tbody tr + tr {
            border-top: 1px solid var(--subject-border);
        }
        #assessmentSection .subject-row {
            background-color: var(--subject-row-bg);
            transition: background-color 0.2s ease;
        }
        #assessmentSection .subject-row:hover {
            background-color: var(--subject-row-hover);
        }
        #assessmentSection .col-sno { width: 32px; min-width: 32px; }
        #assessmentSection .col-chapter { min-width: 200px; width: clamp(220px, 28%, 320px); }
        #assessmentSection .col-class { width: 64px; min-width: 60px; }
        #assessmentSection .col-weightage { width: 88px; min-width: 78px; }
        #assessmentSection .col-level { width: 96px; min-width: 84px; }
        #assessmentSection .col-status { width: 128px; min-width: 116px; }
        #assessmentSection .col-level-me { width: 128px; min-width: 116px; }
        #assessmentSection .comment-header,
        #assessmentSection .comment-cell {
            min-width: 320px;
            width: clamp(320px, 34%, 400px);
            padding-right: 1.75rem;
        }
        #assessmentSection .comment-textarea {
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
        }
        #assessmentSection .tab-button {
            padding: 0.5rem 1.25rem;
            font-size: 0.875rem;
            font-weight: 600;
            border-radius: 0.85rem 0.85rem 0 0;
            border: 1px solid transparent;
            border-bottom-width: 2px;
            transition: all 0.2s ease;
            position: relative;
        }
        #assessmentSection .tab-button.physics { background-color: rgba(191, 219, 254, 0.45); color: #1d4ed8; border-color: rgba(96, 165, 250, 0.6); }
        #assessmentSection .tab-button.chemistry { background-color: rgba(167, 243, 208, 0.45); color: #047857; border-color: rgba(16, 185, 129, 0.45); }
        #assessmentSection .tab-button.mathematics { background-color: rgba(253, 230, 138, 0.45); color: #b45309; border-color: rgba(251, 191, 36, 0.5); }
        #assessmentSection .tab-button.study-plan { background-color: rgba(221, 214, 254, 0.5); color: #5b21b6; border-color: rgba(167, 139, 250, 0.6); }
        #assessmentSection .tab-button.active {
            background-color: #ffffff;
            border-color: #6366f1;
            border-bottom-color: #ffffff;
            color: #312e81;
            box-shadow: 0 -2px 12px rgba(99, 102, 241, 0.18);
        }
        #assessmentSection .tab-button:focus-visible {
            outline: 2px solid rgba(129, 140, 248, 0.6);
            outline-offset: 2px;
        }
        #tabSummary {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
        }
        #tabSummary .tab-summary-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.35rem 0.85rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid transparent;
            background-color: #ffffff;
            color: #1f2937;
        }
        #tabSummary .tab-chip-mastered,
        #tabSummary .tab-chip-revision,
        #tabSummary .tab-chip-not-started {
            background-color: transparent;
            color: #1f2937;
            border-color: rgba(203, 213, 225, 0.6);
        }
        #tabSummary .tab-chip-in-progress {
            background-color: transparent;
            color: #0369a1;
            border-color: rgba(125, 211, 252, 0.6);
        }
        #tabSummary .tab-summary-chip .chip-count {
            font-size: 1.35rem;
            font-weight: 800;
        }
        .no-print {
            display: inline-flex;
        }
        @media print {
            body {
                background: #ffffff;
                color: #000000;
            }
            body * {
                visibility: hidden;
            }
            #studyPlanContainer,
            #studyPlanContainer * {
                visibility: visible;
            }
            #studyPlanContainer {
                position: absolute;
                inset: 0;
                width: 100%;
                box-shadow: none;
            }
            .no-print {
                display: none !important;
            }
        }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

    <div class="max-w-8xl mx-auto px-2 sm:px-4">
        <h1 class="text-4xl font-extrabold text-indigo-700 mb-2 text-center">
            JEE Mains Study Planner
        </h1>
        <!-- Assessment & Study Plan Tabs -->
        <div id="assessmentSection" class="card bg-white overflow-hidden mb-8">
            <div class="px-4 pt-4 pb-3 border-b border-gray-200 flex flex-wrap items-center gap-3">
                <div id="subjectTabs" class="flex flex-wrap gap-1 items-end"></div>
                <div id="tabSummary" class="flex flex-wrap gap-2 items-center"></div>
                <div class="flex-grow"></div>
                <button id="downloadExcelBtn" class="inline-flex items-center gap-2 px-4 py-2 text-sm font-semibold text-indigo-700 border border-indigo-200 rounded-full hover:bg-indigo-50 transition">
                    <span>⬇️</span>
                    <span>Download Excel</span>
                </button>
            </div>

            <div id="assessmentTableContent" class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-white">
                        <tr>
                            <th scope="col" class="px-4 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider col-sno">#</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider col-chapter">Chapter</th>
                            <th scope="col" class="px-4 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider col-class">Class</th>
                            <th scope="col" class="px-4 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider col-weightage">Weightage</th>
                            <th scope="col" class="px-4 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider col-level">Level</th>
                            <th scope="col" class="px-4 py-3 text-left text-xs font-bold text-indigo-800 uppercase tracking-wider col-status">Status</th>
                            <th scope="col" class="px-4 py-3 text-left text-xs font-bold text-pink-600 uppercase tracking-wider col-level-me">My Level</th>
                            <th scope="col" class="px-4 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider comment-header">Comments</th>
                        </tr>
                    </thead>
                    <tbody id="assessmentTableBody">
                        <!-- Chapter rows will be inserted here -->
                    </tbody>
                </table>
            </div>

            <div id="studyPlanContainer" class="hidden">
                <div class="flex items-center justify-between px-4 py-3 border-t bg-purple-50 text-purple-800">
                    <h2 class="text-xl font-bold">Study Plan</h2>
                    <div class="no-print flex items-center gap-2">
                        <button id="printPlanBtn" class="inline-flex items-center gap-1 px-3 py-2 text-sm font-semibold text-indigo-700 border border-indigo-200 rounded-full hover:bg-indigo-50 transition" type="button">
                            <span>🖨️</span>
                            <span>Print</span>
                        </button>
                    </div>
                </div>
                <div id="planContent" class="divide-y divide-gray-200">
                    <!-- Plan items will be injected here -->
                </div>
            </div>
        </div>

        <div class="mt-8 p-4 text-center text-gray-600 border-t pt-4">
            <p>All assessment and plan statuses are saved locally on this browser using LocalStorage.</p>
        </div>
    </div>

        function calculatePriorityWindowDays() {
            const today = new Date();
            const startOfToday = new Date(today.getFullYear(), today.getMonth(), today.getDate());
            const targetMonth = today.getDate() <= 8 ? today.getMonth() : today.getMonth() + 1;
            const targetDate = new Date(today.getFullYear(), targetMonth, 8);
            const diff = Math.round((targetDate - startOfToday) / MS_PER_DAY) + 1;
            return Math.max(1, diff);
        }

        function normalizeTask(task) {
            return {
                subject: task.subject || 'General',
                name: task.name || 'Task',

        function applyPrioritySchedule(plan) {
            if (!Array.isArray(plan) || plan.length === 0) {
                return;
            }

            const priorityQueue = PRIORITY_CHAPTERS.map(entry => ({
                subject: entry.subject,
                name: entry.name,
                type: 'Priority',
                completed: false
            }));

            if (priorityQueue.length === 0) {
                return;
            }

            const windowDays = Math.max(1, Math.min(plan.length, calculatePriorityWindowDays()));
            const tasksPerDay = Math.max(1, Math.ceil(priorityQueue.length / windowDays));

            const deferredTasks = [];
            let priorityIndex = 0;

            for (let dayIdx = 0; dayIdx < windowDays && dayIdx < plan.length; dayIdx++) {
                const day = plan[dayIdx];
                if (!day) {
                    continue;
                }

                const originalTasks = Array.isArray(day.tasks) ? day.tasks.slice() : [];
                const dayPriorityTasks = [];

                for (let i = 0; i < tasksPerDay && priorityIndex < priorityQueue.length; i++, priorityIndex++) {
                    dayPriorityTasks.push(normalizeTask(priorityQueue[priorityIndex]));
                }

                if (dayPriorityTasks.length > 0) {
                    deferredTasks.push(...originalTasks);
                    day.tasks = dayPriorityTasks;
                    day.completed = dayPriorityTasks.every(t => t.completed);
                    day.completionPercentage = day.completed ? 100 : 0;
                } else {
                    day.tasks = originalTasks.map(normalizeTask);
                }
            }

            const remainingPriority = priorityQueue.slice(priorityIndex).map(normalizeTask);
            const redistributionQueue = [...remainingPriority, ...deferredTasks.map(normalizeTask)];

            if (redistributionQueue.length === 0) {
                return;
            }

            let insertDayIdx = Math.min(windowDays, plan.length - 1);
            if (insertDayIdx < 0) {
                insertDayIdx = 0;
            }

            redistributionQueue.forEach(task => {
                const day = plan[insertDayIdx];
                if (!day) {
                    return;
                }

                if (!Array.isArray(day.tasks)) {
                    day.tasks = [];
                }

                day.tasks.push(task);
                day.completed = day.tasks.every(t => t.completed);
                day.completionPercentage = day.completed ? 100 : 0;

                insertDayIdx++;
                if (insertDayIdx >= plan.length) {
                    insertDayIdx = plan.length - 1;
                }
            });
        }

        /** Helper to format a task into the new structured format. */
        const formatTask = (topic, type) => {
            return {

                type: type, // 'NEW/LEARN', 'Practice/Revise', 'MOCK', 'ANALYSIS', 'REST'

            };
        };

        /**
         * Calculates a single priority score based on dual metrics. Higher score means higher priority.
         * Priority = BaseScore (from Weightage) * StatusPenalty + DifficultyPenalty
         */
        function calculateCombinedPriority(chapterName, chapterWeightScore) {
            const statusData = ensureChapterStatus(chapterName);

            const statusConfig = STATUS_OPTIONS.find(o => o.value === statusData.status) || STATUS_OPTIONS[0];
            const confidenceConfig = CONFIDENCE_OPTIONS.find(o => o.value === statusData.confidence) || DEFAULT_CONFIDENCE_OPTION;
            
            // Base Priority (from weightage): 5 (High) / 3 (Medium) / 1 (Low)
            let score = chapterWeightScore; 

            // Status Multiplier: Not Started (5), Theory Done (4), In Progress (3), Completed (2), Mastered (1)
            score *= statusConfig.priority;

            // Confidence Multiplier: Tough (+3), Moderate (+1), Easy (+0)
            score += confidenceConfig.priorityPenalty * 2; 

            return score;
        }


        function generateStudyPlan() {
            
            const chapterPool = [];

            CHAPTERS.forEach(chapter => {
                const combinedScore = calculateCombinedPriority(chapter.name, chapter.priorityScore);
                
                // Only chapters with score > 10 will be actively scheduled for NEW/LEARN/PRACTICE.
                // Chapters with low scores (Mastered/High Confidence) fall out of the active learning pool.
                if (combinedScore > 10) { 
                    // Add chapter to the pool multiple times based on its score to increase scheduling frequency
                    const repeats = Math.ceil(combinedScore / 10);
                    for (let i = 0; i < repeats; i++) {
                        chapterPool.push(chapter);
                    }
                }
            });
            
            // Sort pool by final priority score (descending)
            chapterPool.sort((a, b) => {
                const scoreA = calculateCombinedPriority(a.name, a.priorityScore);
                const scoreB = calculateCombinedPriority(b.name, b.priorityScore);
                return scoreB - scoreA;
            });


            // 2. Schedule Topics
            let chapterIndex = 0;
            const getNextTopic = () => {
                if (chapterPool.length === 0) return null;
                const topic = chapterPool[chapterIndex % chapterPool.length];
                chapterIndex++;
                return topic;
            };

            // 3. Populate the 90 Day Plan
            const tempPlan = [];
            for (let day = 1; day <= TOTAL_DAYS; day++) {
                let dayTasks = [];
                let daySubjects = [];

                if (day <= 75) {
                    // Day 1-75: Core Learning & Revision
                    const topic1 = getNextTopic();
                    let topic2 = getNextTopic(); 

                    if (topic1) {
                        const topic1Status = ensureChapterStatus(topic1.name).status;
                        const taskType = topic1Status === '0_not_started'
                            ? 'NEW/LEARN'
                            : topic1Status === '4_mastered'
                                ? 'Review'
                                : 'Practice/Revise';
                            
                        dayTasks.push(formatTask(topic1, taskType));
                        daySubjects.push(topic1.subject[0]);
                    }
                    
                    // Try to schedule a different subject for the second slot
                    if (topic2) {
                        // Reschedule if topic2 is same as topic1's subject AND we still have items left
                        let attempts = 0;
                        while(topic2.subject === topic1?.subject && attempts < 5 && chapterPool.length > 10) {
                             topic2 = getNextTopic();
                             attempts++;
                        }

                        const topic2Confidence = ensureChapterStatus(topic2.name).confidence;
                        const taskType = topic2Confidence === '0_low'
                            ? 'Intense Practice' : 'Review';

                        dayTasks.push(formatTask(topic2, taskType));
                        daySubjects.push(topic2.subject[0]);
                    }
                    
                    // Add quick test rotation
                    if (day % 5 === 0 && dayTasks.length > 0) { 
                         dayTasks.push({
                            subject: 'Test',
                            name: `Quick Practice Test on: ${dayTasks.map(t => t.subject).join('/')} topics.`,
                            type: 'MOCK',
                            completed: false
                        });
                        daySubjects.push('T');
                    }
                    if (dayTasks.length === 0) {
                        dayTasks.push({ subject: 'Rest', name: 'Rest/Self-Study (Plan Pool Exhausted)', type: 'REST', completed: false });
                        daySubjects.push('R');
                    }

                    tempPlan.push({
                        day: day,
                        tasks: dayTasks,
                        subjectSummary: [...new Set(daySubjects)].join('/'), 
                        completed: false,
                        completionPercentage: 0
                    });

                } else {
                    // Day 76-90: Full-Length Mocks and Analysis
                    const isMockDay = day % 2 !== 0;
                    const mockNumber = Math.ceil((day - 75) / 2);
                    const taskName = isMockDay
                        ? `FULL MOCK TEST (${mockNumber} of 8)`
                        : `MOCK ANALYSIS & Correction: Review MOCK ${mockNumber-1} (Focus on Errors)`;

                    dayTasks.push({
                        subject: 'Mock Test',
                        name: taskName,
                        type: isMockDay ? 'FULL_MOCK' : 'ANALYSIS',
                        completed: false
                    });

                    tempPlan.push({
                        day: day,
                        tasks: dayTasks,
                        subjectSummary: 'MOCK/ANALYSIS',
                        completed: false,
                        completionPercentage: 0
                    });
                }
            }

            applyPrioritySchedule(tempPlan);
            studyPlan = tempPlan;
            savePlan();
            renderStudyPlan();
            updateTabContentVisibility();
        }


        // --- STUDY PLAN RENDERING ---

        function renderStudyPlan() {
            const planContainer = document.getElementById('studyPlanContainer');
            const planContent = document.getElementById('planContent');
            if (!planContainer || !planContent) {
                return;
            }

            planContent.innerHTML = '';

            if (studyPlan.length === 0) {
                planContent.innerHTML = '<div class="p-4 text-sm text-gray-500">Generate your study plan to see daily tasks here.</div>';
                updateTabContentVisibility();
                return;
            }

            // Render Daily Plan
            studyPlan.forEach(item => {
                const row = document.createElement('div');
                const isDayCompleted = item.completed;
                const { dateString, dayName } = getPlanDate(item.day);
                
                const dayClasses = [
                    'p-4',
                    'transition',
                    'duration-150',
                    dayName === 'Sun' ? 'sunday-highlight' : '',
                    isDayCompleted ? 'completed-day' : 'hover:bg-indigo-50'
                ].filter(Boolean).join(' ');

                row.className = dayClasses;

                row.innerHTML = `
                    <div class="flex items-start justify-between">
                        <div class="flex space-x-4 items-center mb-2">
                            <div class="font-extrabold text-lg text-pink-600">Day ${item.day}</div>
                            <div class="font-medium text-lg text-gray-500">(${dayName}, ${dateString})</div>
                        </div>
                    </div>
                    
                    <div class="border-t border-gray-200 pt-3 mt-2">
                        <div class="space-y-3 pt-2">
                            ${item.tasks.map((task, index) => {
                                const detail = getTaskDetail(task);
                                const detailHTML = detail ? `<div class="text-xs text-gray-500 mt-1 leading-snug">${detail}</div>` : '';
                                const subjectClass = (task.subject || '').toLowerCase().includes('physics') ? 'physics' :
                                                       (task.subject || '').toLowerCase().includes('chemistry') ? 'chemistry' :
                                                       (task.subject || '').toLowerCase().includes('math') ? 'mathematics' :
                                                       (task.subject || '').toLowerCase().includes('mock') ? 'mock' : '';
                                return `
                                    <div class="flex items-center justify-between p-3 rounded-lg border border-gray-200 bg-white">
                                        <div class="flex-grow pr-4">
                                            <div class="text-sm text-gray-800 flex flex-col sm:flex-row sm:items-center sm:gap-2">
                                                <span class="subject-tag ${subjectClass}">${task.subject}</span>
                                                <span>${task.name}</span>
                                            </div>
                                            ${detailHTML}
                                        </div>
                                        <label class="flex items-center space-x-2 flex-shrink-0">
                                            <span class="text-xs font-medium ${task.completed ? 'text-green-600' : 'text-gray-500'}">${task.completed ? 'Done' : 'Complete'}</span>
                                            <input type="checkbox" data-day="${item.day}" data-task-index="${index}" ${task.completed ? 'checked' : ''} class="task-checkbox form-checkbox h-4 w-4 text-green-600 border-gray-300 rounded focus:ring-green-500">
                                        </label>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
                
                planContent.appendChild(row);
                
                // Attach event listener for the new class 'task-checkbox'
                const taskCheckboxes = row.querySelectorAll('.task-checkbox');
                taskCheckboxes.forEach(checkbox => {
                    checkbox.addEventListener('change', (e) => {
                        const day = parseInt(e.target.dataset.day);
                        const taskIndex = parseInt(e.target.dataset.taskIndex);
                        handlePlanStatusChange(day, taskIndex, e.target.checked);
                    });
                });
            });
            updateTabContentVisibility();
            if (selectedSubject === STUDY_PLAN_TAB) {
                planContainer.scrollIntoView({ behavior: 'smooth' });
            }
        }
        
        // --- INITIALIZATION ---
        
        window.onload = function() {
            loadStatus();
            loadPlan();
            
            renderTabSummary(computeSummaryData().metrics);
            renderSubjectTabs();
            renderTable();
            if (studyPlan.length > 0) {
                renderStudyPlan();
            } else {
                generateStudyPlan();
            }
            const downloadBtn = document.getElementById('downloadExcelBtn');
            if (downloadBtn) {
                downloadBtn.addEventListener('click', downloadAssessmentExcel);
            }
            const printBtn = document.getElementById('printPlanBtn');
            if (printBtn) {
                printBtn.addEventListener('click', () => window.print());
            }
        };

    </script>
</body>
