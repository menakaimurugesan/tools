<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IX CFS Activity Calendar 2026-2027</title>
  <style>
    :root {
      --bg:#eef3fb; --panel:#ffffff; --ink:#172033; --muted:#63708a; --line:#d9e2ef;
      --brand:#0b2d63; --brand2:#1b68d2; --holiday:#fff4b8; --break:#e9f7ef; --exam:#ffe0e0;
      --event:#e8f0ff; --ptm:#f2e8ff; --regular:#ffffff; --shadow:0 14px 35px rgba(18,38,63,.10);
    }
    *{box-sizing:border-box}
    html,body{height:100%; margin:0; font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; color:var(--ink); background:linear-gradient(135deg,#eef3fb 0%,#f8fbff 100%);}
    body{overflow:hidden}
    .app{height:100vh; display:flex; flex-direction:column; padding:14px; gap:12px}
    header{background:var(--panel); border:1px solid var(--line); border-radius:22px; box-shadow:var(--shadow); padding:14px 16px; display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:14px;}
    .title{min-width:0}
    .kicker{font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--brand2); font-weight:800}
    h1{font-size:clamp(20px,2.5vw,34px); margin:2px 0 0; line-height:1.1; color:var(--brand)}
    .subtitle{font-size:13px; color:var(--muted); margin-top:4px}
    .monthNav{display:flex; align-items:center; justify-content:center; gap:10px;}
    .btn{border:0; background:var(--brand); color:#fff; padding:10px 14px; border-radius:14px; font-weight:800; cursor:pointer; box-shadow:0 8px 16px rgba(11,45,99,.18)}
    .btn:hover{filter:brightness(1.08)}
    .btn.secondary{background:#edf4ff; color:var(--brand); border:1px solid #cfe0ff; box-shadow:none}
    select{border:1px solid var(--line); border-radius:14px; padding:10px 12px; font-weight:800; color:var(--brand); background:#fff; min-width:210px; text-align:center}
    .tools{display:flex; justify-content:flex-end; gap:8px; flex-wrap:wrap}
    .legend{display:flex; align-items:center; gap:10px; flex-wrap:wrap; font-size:12px; color:var(--muted)}
    .pill{display:inline-flex; align-items:center; gap:6px; white-space:nowrap}
    .dot{width:12px; height:12px; border-radius:4px; border:1px solid rgba(0,0,0,.12)}
    .calendar{flex:1; min-height:0; background:var(--panel); border:1px solid var(--line); border-radius:24px; box-shadow:var(--shadow); padding:12px; display:grid; grid-template-rows:auto 1fr; gap:10px}
    .weekdays{display:grid; grid-template-columns:repeat(7,1fr); gap:8px}
    .weekday{text-align:center; color:var(--muted); font-size:12px; font-weight:900; text-transform:uppercase; letter-spacing:.08em; padding:8px 0}
    .grid{display:grid; grid-template-columns:repeat(7,1fr); grid-auto-rows:1fr; gap:8px; min-height:0}
    .cell{border:1px solid var(--line); border-radius:18px; padding:10px; min-width:0; overflow:hidden; display:flex; flex-direction:column; gap:8px; background:var(--regular); position:relative}
    .cell.out{opacity:.22; background:#f6f8fc}
    .cell.holiday{background:var(--holiday); border-color:#eadb72}
    .cell.break{background:var(--break); border-color:#badfc8}
    .cell.exam{background:var(--exam); border-color:#f6b2b2}
    .cell.event{background:var(--event); border-color:#b6cdf9}
    .cell.ptm{background:var(--ptm); border-color:#d8c2ff}
    .cell.today{outline:3px solid var(--brand2); outline-offset:-3px}
    .dateRow{display:flex; align-items:center; justify-content:space-between; gap:6px}
    .dateNum{font-size:clamp(17px,1.8vw,26px); font-weight:950; color:var(--brand)}
    .dayCount{font-size:12px; color:var(--muted); font-weight:900; border:1px solid rgba(0,0,0,.10); padding:3px 7px; border-radius:999px; background:rgba(255,255,255,.65)}
    .activity{display:block !important; min-height:30px; font-size:clamp(12px,1.05vw,15px); font-weight:900; line-height:1.18; overflow:visible; word-break:break-word; color:#172033; padding:2px 0 0}
    .sourceNote{display:block; margin-top:4px; font-size:11px; line-height:1.15; color:#6a5b00; font-weight:800}
    .activityBadge{display:block; padding:5px 7px; border-radius:10px; background:rgba(255,255,255,.72); border:1px solid rgba(0,0,0,.08); box-shadow:0 1px 0 rgba(255,255,255,.5) inset}
    .empty{color:#a3acbb; font-weight:700}
    .meta{margin-top:auto; font-size:11px; color:var(--muted); font-weight:800}
    footer{font-size:11px; color:var(--muted); text-align:right; padding:0 4px}
    @media(max-width:900px){
      body{overflow:auto} .app{height:auto; min-height:100vh} header{grid-template-columns:1fr; align-items:stretch} .tools{justify-content:flex-start} .grid{grid-auto-rows:minmax(115px,1fr)}
      .calendar{min-height:760px} select{min-width:100%} .monthNav{display:grid; grid-template-columns:auto 1fr auto}
    }
    @media print{body{overflow:visible;background:#fff} .app{height:auto;padding:0} header{box-shadow:none;border:0} .tools,.monthNav .btn{display:none} .calendar{box-shadow:none;border:0} .cell{break-inside:avoid}}
  </style>
</head>

      </div>
      <div class="tools">

        <button class="btn secondary" onclick="window.print()">Print</button>

      <span class="pill"><span class="dot" style="background:var(--ptm)"></span>PTM</span>

    <footer>Prepared from IX CFS-only activity calendar extracted from the FGSC AY 2026-27 calendar.</footer>

const byDate = Object.fromEntries(DATA.map(e => [e.date, e]));
const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const months = [...new Set(DATA.map(e => e.date.slice(0,7)))];
let currentIndex = Math.max(0, months.indexOf(new Date().toISOString().slice(0,7)));
if(currentIndex < 0) currentIndex = 0;
const select = document.getElementById('monthSelect');
months.forEach((m,i)=>{
  const [y,mo] = m.split('-').map(Number);
  const opt = document.createElement('option');
  opt.value = i; opt.textContent = `${monthNames[mo-1]} ${y}`;
  select.appendChild(opt);
});
function classify(e) {
  const a = (e?.activity || '').toLowerCase();
  const day = e?.day || '';
  if(day === 'H' || /holiday|pooja|poosam|pongal|good friday|may day|new year|chaturthi|janmashtami|diwali|christmas|muharram|nabi|aadi|tarang/.test(a)) return 'holiday';
  if(/break|rejuvenation/.test(a)) return 'break';
  if(/exam|test|quarterly|annual|pre board|prep|revision|practical|pt\s?1|pt\s?2|pt\s?3|pt2|review/.test(a)) return 'exam';
  if(/ptm/.test(a)) return 'ptm';
  if(a && a !== '-' && /celebration|ceremony|orientation|kalrav|milanotsav|robo|scientifig|checkmate|module|course|school reopens|login|yoga|wish|sports/.test(a)) return 'event';
  return '';
}
function render() {
  const ym = months[currentIndex];
  select.value = String(currentIndex);
  const [year, month] = ym.split('-').map(Number);
  const first = new Date(year, month-1, 1);
  const daysInMonth = new Date(year, month, 0).getDate();
  const startOffset = first.getDay();
  const totalCells = Math.ceil((startOffset + daysInMonth)/7)*7;
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const todayISO = new Date().toISOString().slice(0,10);
  for(let i=0;i<totalCells;i++) {
    const cell = document.createElement('div');
    const dayNum = i - startOffset + 1;
    if(dayNum < 1 || dayNum > daysInMonth) {
      cell.className = 'cell out';
      grid.appendChild(cell); continue;
    }
    const iso = `${year}-${String(month).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
    const e = byDate[iso] || {activity:'-', day:'-'};
    const cls = classify(e);
    cell.className = `cell ${cls} ${iso===todayISO?'today':''}`;
    const weekdayName = new Date(iso+'T00:00:00').toLocaleDateString('en-IN',{weekday:'long'});
    const act = displayActivity(e, weekdayName);
    cell.innerHTML = `
      <div class="dateRow"><div class="dateNum">${dayNum}</div><div class="dayCount">Day: ${escapeHtml(e.day || '-')}</div></div>
      <div class="activity">${act}</div>
      <div class="meta">${weekdayName}</div>`;
    grid.appendChild(cell);
  }
}
function escapeHtml(s) { return String(s).replace(/[&<>'"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
function displayActivity(e, weekdayName) {
  const activity = String(e.activity || '-').trim();
  const day = String(e.day || '-').trim();

  if(activity === '-' && day === 'H') {
    return '<span class="activityBadge">Holiday</span><span class="sourceNote">Reason not specified in source calendar</span>';
  }
  if(activity === '-') {
    return '<span class="empty">Regular class day</span>';
  }
  if(activity.toLowerCase() === 'holiday') {
    const label = weekdayName === 'Sunday' ? 'Sunday Holiday' : 'Holiday';
    const note = weekdayName === 'Sunday' ? 'Weekly holiday' : 'Reason not specified in source calendar';
    return `<span class="activityBadge">${escapeHtml(label)}</span><span class="sourceNote">${escapeHtml(note)}</span>`;
  }
  if(day === 'H') {
    return `<span class="activityBadge">Holiday: ${escapeHtml(activity)}</span>`;
  }
  return `<span class="activityBadge">${escapeHtml(activity)}</span>`;
}
document.getElementById('prevBtn').onclick=()=>{ if(currentIndex>0){currentIndex--; render();} };
document.getElementById('nextBtn').onclick=()=>{ if(currentIndex<months.length-1){currentIndex++; render();} };
select.onchange=()=>{ currentIndex=Number(select.value); render(); };
document.getElementById('todayBtn').onclick=()=>{ const idx=months.indexOf(new Date().toISOString().slice(0,7)); currentIndex=idx>=0?idx:0; render(); };
document.getElementById('fullBtn').onclick=()=>{ const el=document.documentElement; if(!document.fullscreenElement) el.requestFullscreen?.(); else document.exitFullscreen?.(); };
document.addEventListener('keydown', e=>{ if(e.key==='ArrowLeft') document.getElementById('prevBtn').click(); if(e.key==='ArrowRight') document.getElementById('nextBtn').click(); });
render();
